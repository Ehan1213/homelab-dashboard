volumes:
  db_data:

services:
  flask:
    build:
      context: .
      dockerfile: app/flask-app.dockerfile
    healthcheck:
      test: ["CMD", "python", "/app/utils/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5   
    depends_on:

      db:
        condition: service_healthy
        

  db:
    image: postgres:14.23
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - .env
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    volumes:
      - db_data:/var/lib/postgresql/data
    