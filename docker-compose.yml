volumes:
  db_data:

services:
  flask:
    build:
      context: .
      dockerfile: flask-app.dockerfile
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "/app/app/utils/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s 
    depends_on:
      db:
        condition: service_healthy
        
  db:
    image: postgres:14.23
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - .env
    ports:
      - "5432:5432"
    # set shared memory limit when using docker compose
    shm_size: 128mb
    volumes:
      - db_data:/var/lib/postgresql/data
    
  nginx:
    build:
      context: .
      dockerfile: nginx/nginx.dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      flask:
        condition: service_healthy

